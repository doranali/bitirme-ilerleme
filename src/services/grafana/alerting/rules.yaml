apiVersion: 1

groups:
  - orgId: 1
    name: soc-golden-signals
    folder: SOC
    interval: 1m
    rules:
      - uid: kafka-lag-high
        title: Kafka Lag > 100000
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: opensearch-main
            model:
              datasource:
                type: grafana-opensearch-datasource
                uid: opensearch-main
              refId: A
              query: kafka_lag:[100000 TO *]
              timeField: '@timestamp'
              bucketAggs:
                - id: '2'
                  type: date_histogram
                  field: '@timestamp'
                  settings:
                    interval: 1m
                    min_doc_count: 0
              metrics:
                - id: '1'
                  type: count
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    type: last
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: Kafka lag high threshold exceeded
        labels:
          severity: critical
          stream: platform

      - uid: disk-usage-high
        title: Disk Usage > 90%
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: opensearch-main
            model:
              datasource:
                type: grafana-opensearch-datasource
                uid: opensearch-main
              refId: A
              query: disk_usage_pct:[90 TO *]
              timeField: '@timestamp'
              bucketAggs:
                - id: '2'
                  type: date_histogram
                  field: '@timestamp'
                  settings:
                    interval: 1m
                    min_doc_count: 0
              metrics:
                - id: '1'
                  type: count
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    type: last
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: Disk usage high threshold exceeded
        labels:
          severity: critical
          stream: infrastructure
