[PARSER]
    Name        json
    Format      json
    Time_Key    time
    # İki farklı formatı destekle
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Format %Y-%m-%dT%H:%M:%S
    Time_Keep   On
    Time_Offset +0300

[PARSER]
    Name        syslog-rfc3164
    Format      regex
    Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

[PARSER]
    Name        syslog-rfc5424
    Format      regex
    Regex       ^\<(?<pri>[0-9]{1,3})\>1 (?<time>[^ ]+) (?<host>[^ ]+) (?<ident>[^ ]+) (?<pid>[^ ]+) (?<msgid>[^ ]+) (?<extradata>(\-|\[[^\]]+\])) (?<message>.+)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

# Faz C: Cesitli syslog formatlarini (RFC3164 + RFC5424) kabul eden esnek parser.
# Time_Format siralamasi: once RFC3164 (ag / ağ cihazlari), sonra ISO (RFC5424) — warning gurultusunu azaltir.
# Mesaj timestamp parse edilemese bile field'lar dolar; fluent-bit kendi alis zamanini Time_Keep On
# ile koruyacaktir.
[PARSER]
    Name        syslog-flex
    Format      regex
    Regex       ^\<(?<pri>[0-9]+)\>(?:1 )?(?<time>(?:[^ ]+T[^ ]+(?:[+\-Z][^ ]*)?)|(?:[A-Z][a-z]{2}[ ]{1,2}[0-9]{1,2}[ ][0-9:]+))[ ]+(?<host>[^ ]+)[ ]+(?<ident>[^ \[:]+)(?:\[(?<pid>[0-9]+)\])?(?:[^:]*:)?[ ]*(?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Offset +0300
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Format %Y-%m-%dT%H:%M:%S%z
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Format %Y-%m-%dT%H:%M:%SZ
    Time_Keep   On

# Vendor-agnostik multiline:
# - Genis start_state: bilinen tum tarih / format kalipla cover edilir + jenerik fallback
# - Boylece LogHub gibi tanimsiz formatlarda log drop yasanmaz
[MULTILINE_PARSER]
    name          java_multiline
    type          regex
    flush_timeout 1000
    rule          "start_state"   "/^(<\d+>|\d{4}-\d{2}-\d{2}|\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}|[A-Z][a-z]{2}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}|\[\w{3}\s+\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}\s+\d{4}\]|\d{6}\s+\d{6}|\d{8}-\d{2}:\d{2}:\d{2}|-\s+\d+\s+\d{4}\.\d{2}\.\d{2}|[A-Za-z0-9_\[\(\{\.\-\/])/"  "cont"
    rule          "cont"          "/^(\s+at\s|\s+\.\.\.\s|Caused by:|Suppressed:|\s+Suppressed:|\s+at\s|\tat\s)/"  "cont"

[MULTILINE_PARSER]
    name          cef_leef_multiline
    type          regex
    flush_timeout 500
    rule          "start_state"   "/^(CEF\s|LEEF\s|\d+\|)/"  "cont"
    rule          "cont"          "/^(?!(CEF\s|LEEF\s|\d+\|))/"
