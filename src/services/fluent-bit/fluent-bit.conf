# Merkez Fluent Bit (Docker)
# - 5151/udp: Fluent Bit ajanlarının gönderdiği JSON
# - 1514/udp ve 1514/tcp: vCenter / firewall gibi cihazların gönderdiği klasik syslog (ekstra relay sunucu şart değil)
# Ağır alan eşlemesi Graylog'dadır. Akış özeti: docs/LOG_AKISI_UCTAN_UCA_NORMALIZASYON_TR.md
#
# 5651 / izlenebilirlik: syslog INPUT Source_Address_Key → syslog_sender_ip (Fluent Bit’in soketten gördüğü
# gerçek gönderen adresi). Graylog gl2_remote_ip çoğu kurulumda GELF ile ileten konteyneri gösterir; denetim
# ve olay eşlemesi için syslog_sender_ip + ham arşiv satırı birlikte kullanılmalıdır.

[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    Health_Check On
    HC_Period    10
    HC_Retries   3
    HC_Errors    10

# Input: UDP (port 5151) - Test log generator için
[INPUT]
    Name        udp
    Listen      0.0.0.0
    Port        5151
    Format      json
    Tag         test.generator

# Input: UDP (port 5152) - Synthetic metrics-only test trafiği
[INPUT]
    Name        udp
    Listen      0.0.0.0
    Port        5152
    Format      json
    Tag         synthetic.metrics

# Input: UDP (port 5153) - Synthetic isolated-e2e test trafiği
[INPUT]
    Name        udp
    Listen      0.0.0.0
    Port        5153
    Format      json
    Tag         synthetic.e2e

# Doğrudan merkez: syslog (vCenter, firewall, switch) — aynı işlem hattına bağlanır
[INPUT]
    Name                 syslog
    Mode                 udp
    Listen               0.0.0.0
    Port                 1514
    Parser               syslog-rfc3164
    Tag                  ingest.syslog
    Source_Address_Key   syslog_sender_ip

[INPUT]
    Name                 syslog
    Mode                 tcp
    Listen               0.0.0.0
    Port                 1514
    Parser               syslog-rfc3164
    Tag                  ingest.syslog
    Source_Address_Key   syslog_sender_ip

# Filter: Tüm loglara 5651 gereksinimleri ve sistem bilgileri ekle
[FILTER]
    Name            record_modifier
    Match           *
    Record          timezone Europe/Istanbul
    Record          log_source tubitak_log_server
    Record          compliance_5651 true

# Edge tagging: ağır parse yerine minimum metadata bas
[FILTER]
    Name            modify
    Match           *
    Add             ingest_mode edge_tagging

[FILTER]
    Name            modify
    Match           *
    Condition       Key_does_not_exist vendor
    Add             vendor unknown

# company_id: önce JSON payload (ajan / özel entegratör), yoksa konteyner COMPANY_ID (tek kiracı).
# Log metninden «şirket adı tahmini» yapılmaz — INGEST_SOZLESMESI_v1: bilinçli metadata.
[FILTER]
    Name            modify
    Match           *
    Condition       Key_does_not_exist company_id
    Add             company_id ${COMPANY_ID}

[FILTER]
    Name            modify
    Match           *
    Condition       Key_does_not_exist log_type
    Add             log_type generic

# Syslog ile gelenler: ağ / cihaz logu olarak işaretle (Graylog panelleri için)
[FILTER]
    Name            record_modifier
    Match           ingest.syslog
    Record          log_type network

[FILTER]
    Name            modify
    Match           ingest.syslog
    Condition       Key_does_not_exist log_env
    Add             log_env ${LOG_SYSTEM_ENV}

# --- UDP 5151 (test.generator / Windows winlog): kimlik + mesaj + zaman ---
# FB modify: Copy hedef anahtar VARSA yazmaz; Hard_copy üzerine yazar. unknown-host + winlog_event
# hataları bu yüzden oluşuyordu. Önce ComputerName/Host normalize, sonra genel unknown-host.

[FILTER]
    Name            modify
    Match           test.generator
    Condition       Key_exists computername
    Condition       Key_does_not_exist ComputerName
    Copy            computername ComputerName

[FILTER]
    Name            modify
    Match           test.generator
    Condition       Key_exists Host
    Hard_copy       Host host

[FILTER]
    Name            modify
    Match           test.generator
    Condition       Key_exists ComputerName
    Hard_copy       ComputerName host
    Hard_copy       ComputerName source

[FILTER]
    Name            modify
    Match           test.generator
    Condition       Key_exists Hostname
    Condition       Key_does_not_exist ComputerName
    Condition       Key_does_not_exist host
    Copy            Hostname host

[FILTER]
    Name            modify
    Match           test.generator
    Condition       Key_exists Hostname
    Condition       Key_does_not_exist ComputerName
    Condition       Key_does_not_exist source
    Copy            Hostname source

[FILTER]
    Name            modify
    Match           test.generator
    Condition       Key_exists hostname
    Condition       Key_does_not_exist ComputerName
    Condition       Key_does_not_exist host
    Copy            hostname host

[FILTER]
    Name            modify
    Match           *
    Condition       Key_exists source
    Condition       Key_does_not_exist host
    Copy            source host

[FILTER]
    Name            modify
    Match           *
    Condition       Key_does_not_exist host
    Add             host unknown-host

# GELF: olay zamanı Unix epoch (winlog "date"); arayüz TZ = GRAYLOG_ROOT_TIMEZONE (standart Europe/Istanbul).
# Kullanıcı profili: Graylog → Profil → Time zone → Europe/Istanbul (UTC ile karıştırmayın).
[FILTER]
    Name            modify
    Match           test.generator
    Condition       Key_exists date
    Hard_copy       date timestamp

# Önce gerçek olay metni; yoksa GELF için kısa yedek
[FILTER]
    Name            modify
    Match           test.generator
    Condition       Key_exists Message
    Hard_copy       Message message

[FILTER]
    Name            modify
    Match           test.generator
    Condition       Key_does_not_exist message
    Add             _fb_fallback_msg winlog_event

[FILTER]
    Name            modify
    Match           test.generator
    Condition       Key_exists _fb_fallback_msg
    Condition       Key_does_not_exist message
    Copy            _fb_fallback_msg message

# log_env: konteyner LOG_SYSTEM_ENV (compose varsayılanı prod=prod, lab=dev_test). Çıktılardan ÖNCE olmalı.
[FILTER]
    Name            modify
    Match           synthetic.*
    Add             log_env dev_test

[FILTER]
    Name            modify
    Match           test.generator
    Condition       Key_does_not_exist log_env
    Add             log_env ${LOG_SYSTEM_ENV}

# Output 1: YASAL ARŞİV YOLU (Sol Kol)
# Günlük klasörlere yazma (5651 uyumluluk)
[OUTPUT]
    Name            file
    Match           test.generator
    Path            /fluent-bit/arsiv/
    Format          template
    Template        {"timestamp":"{time}","source":"{tag}","system":"tubitak_log_server","message":"{message}"}
    File            data-%Y-%m-%d.log
    Retry_Limit     False
    Mkdir           true

# Output 2: KAFKA RAW (Merkezi normalizasyon için)
[OUTPUT]
    Name            kafka
    Match           test.generator
    Brokers         kafka1:9092,kafka2:9092,kafka3:9092
    Topics          logs_raw
    Timestamp_Key   @timestamp
    rdkafka.compression.codec lz4
    rdkafka.request.required.acks -1
    rdkafka.queue.buffering.max.ms 250

# Output 3: Graylog GELF (Merkezi pipeline katmanı)
[OUTPUT]
    Name            gelf
    Match           test.generator
    Host            graylog
    Port            12201
    Mode            udp
    Gelf_Short_Message_Key message
    Gelf_Host_Key   host
    Gelf_Timestamp_Key timestamp

# Aynı çıkışlar: doğrudan syslog (ingest.syslog) — performans için ayrı süreç yok, yalnızca ek giriş
[OUTPUT]
    Name            file
    Match           ingest.syslog
    Path            /fluent-bit/arsiv/
    Format          template
    Template        {"timestamp":"{time}","source":"{tag}","syslog_sender_ip":"{syslog_sender_ip}","system":"tubitak_log_server","host":"{host}","message":"{message}","compliance_5651":"true"}
    File            data-%Y-%m-%d.log
    Retry_Limit     False
    Mkdir           true

[OUTPUT]
    Name            kafka
    Match           ingest.syslog
    Brokers         kafka1:9092,kafka2:9092,kafka3:9092
    Topics          logs_raw
    Timestamp_Key   @timestamp
    rdkafka.compression.codec lz4
    rdkafka.request.required.acks -1
    rdkafka.queue.buffering.max.ms 250

[OUTPUT]
    Name            gelf
    Match           ingest.syslog
    Host            graylog
    Port            12201
    Mode            udp
    Gelf_Short_Message_Key message
    Gelf_Host_Key   host
    Gelf_Timestamp_Key timestamp

# Synthetic metrics-only modu: kayıtları saklamadan düş
[OUTPUT]
    Name            null
    Match           synthetic.metrics

# Synthetic isolated-e2e modu: üretim topic'inden ayrık topic'e yaz
[OUTPUT]
    Name            kafka
    Match           synthetic.e2e
    Brokers         kafka1:9092,kafka2:9092,kafka3:9092
    Topics          logs_synthetic
    Timestamp_Key   @timestamp
    rdkafka.compression.codec lz4
    rdkafka.request.required.acks -1
    rdkafka.queue.buffering.max.ms 250
