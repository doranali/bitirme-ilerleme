apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-fluent-bit-config
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
        Log_Level    info
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_PORT    {{ .Values.fluentBit.httpPort }}
        Parsers_File parsers.conf

{{ .Values.fluentBit.config.inputs | indent 4 }}

{{ .Values.fluentBit.config.filters | indent 4 }}

{{ .Values.fluentBit.config.outputs | indent 4 }}
  parsers.conf: |
    [PARSER]
        Name        json
        Format      json

    [PARSER]
        Name        syslog-rfc3164
        Format      regex
        Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
        Time_Key    time
        Time_Format %b %d %H:%M:%S
        Time_Keep   On
